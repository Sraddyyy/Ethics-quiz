    let currentIndex = 0;
    let score = 0;
    let selections = new Array(quizData.length).fill(null); // Keeps track of user selections

    const quizArea = document.getElementById('quiz-area');
    const currentQNumSpan = document.getElementById('current-q-num');
    const currentScoreSpan = document.getElementById('current-score');
    const prevBtn = document.getElementById('prev-btn');
    const nextBtn = document.getElementById('next-btn');

    function renderQuestion(index) {
        if(index >= quizData.length) {
            renderSummary();
            return;
        }

        const data = quizData[index];
        currentQNumSpan.textContent = index + 1;
        currentScoreSpan.textContent = score;

        // Reset navigation buttons setup
        prevBtn.disabled = index === 0;
        nextBtn.disabled = selections[index] === null; 
        if(index === quizData.length - 1 && selections[index] !== null) {
            nextBtn.textContent = "Finish & See Summary";
        } else {
            nextBtn.textContent = "Next Question";
        }

        let html = `
            <div class="quiz-card">
                <div class="question-meta">Item ${index + 1}</div>
                <p class="question-text">${data.question}</p>
                
                <button class="hint-btn" onclick="toggleHint()">Need a hint?</button>
                <div id="hint-block" class="hint-text">${data.hint}</div>

                <ul class="options-list">
        `;

        data.options.forEach((opt, oIdx) => {
            let extraClass = "";
            // If user already answered this question previously
            if(selections[index] !== null) {
                extraClass += " disabled";
                if(opt.isCorrect) extraClass += " correct";
                if(selections[index] === oIdx && !opt.isCorrect) extraClass += " incorrect";
            }

            html += `
                <li class="option-item${extraClass}" onclick="selectOption(${oIdx})">
                    ${String.fromCharCode(65 + oIdx)}. ${opt.text}
                </li>
            `;
        });

        html += `
                </ul>
                <div id="feedback-block" class="feedback">
                    <div id="feedback-title" class="feedback-title"></div>
                    <div id="feedback-rationale"></div>
                </div>
            </div>
        `;

        quizArea.innerHTML = html;

        // Restore feedback states if already selected
        if(selections[index] !== null) {
            showFeedback(data.options[selections[index]], data);
        }
    }

    function toggleHint() {
        const hint = document.getElementById('hint-block');
        hint.style.display = hint.style.display === 'block' ? 'none' : 'block';
    }

    function selectOption(optIndex) {
        if(selections[currentIndex] !== null) return; // Block double choosing

        selections[currentIndex] = optIndex;
        const data = quizData[currentIndex];
        const selectedOpt = data.options[optIndex];

        if(selectedOpt.isCorrect) {
            score++;
            currentScoreSpan.textContent = score;
        }

        // Re-render immediately to colorize options elements and disable further actions
        renderQuestion(currentIndex);
    }

    function showFeedback(selectedOpt, questionData) {
        const fbBlock = document.getElementById('feedback-block');
        const fbTitle = document.getElementById('feedback-title');
        const fbRatio = document.getElementById('feedback-rationale');

        fbBlock.className = "feedback visible " + (selectedOpt.isCorrect ? "correct" : "incorrect");
        fbBlock.style.backgroundColor = selectedOpt.isCorrect ? "#d4edda" : "#f8d7da";
        fbBlock.style.borderLeft = `5px solid ${selectedOpt.isCorrect ? 'var(--success)' : 'var(--danger)'}`;
        
        fbTitle.textContent = selectedOpt.isCorrect ? "✓ Correct Answer!" : "✗ Incorrect Attempt";
        fbTitle.style.color = selectedOpt.isCorrect ? "#155724" : "#721c24";
        
        fbRatio.textContent = selectedOpt.rationale;
    }

    function nextQuestion() {
        currentIndex++;
        renderQuestion(currentIndex);
    }

    function prevQuestion() {
        if(currentIndex > 0) {
            currentIndex--;
            renderQuestion(currentIndex);
        }
    }

    function renderSummary() {
        document.querySelector('.score-tracker').style.display = 'none';
        prevBtn.style.display = 'none';
        nextBtn.style.display = 'none';

        const percentage = Math.round((score / quizData.length) * 100);
        let message = "Keep studying! Review your lecture notes to secure your grade.";
        if(percentage >= 90) message = "Excellent work! You have perfectly mastered the ethics final coverage.";
        else if(percentage >= 75) message = "Great job! You've got a secure grasp on most components.";

        quizArea.innerHTML = `
            <div class="quiz-card summary-card">
                <h2>Review Summary Complete</h2>
                <p>You have finished all 30 quiz multiple-choice review problems.</p>
                <div class="summary-score">${score} / ${quizData.length}</div>
                <p style="font-size: 1.2rem; font-weight: bold; color: #555;">Grade: ${percentage}%</p>
                <p style="margin-top: 20px; color: #666; font-style: italic;">${message}</p>
                <button style="margin-top:25px;" onclick="window.location.reload()">Restart Review Exercise</button>
            </div>
        `;
    }

    // Initial load
    renderQuestion(currentIndex);
</script>
